# cargo-deny configuration for the Solana OFT program.
# Run locally with: cargo deny --manifest-path contracts/solanaOFT/Cargo.toml check licenses

[graph]
targets = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD-3-Clause-Clear",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[advisories]
version = 2
yanked = "warn"
