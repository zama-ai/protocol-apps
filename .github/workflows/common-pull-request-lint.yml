name: common-pull-request

on:
  pull_request:

env:
  ACTIONLINT_VERSION: 1.7.10
  # Safe-chain enforces its own minimum-package-age check independently;
  # mirror the age (72 h) here so fresh, unvetted package versions are blocked.
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: "72"

permissions: {}

jobs:
  lint:
    name: common-pull-request/lint (bpr)
    permissions:
      contents: 'read' # Required to checkout repository code
      security-events: 'write' # Required to write security events for SAST results
      actions: 'read' # Required for workflows in private repositories
      pull-requests: write # Required to post PR review comments
    runs-on: ubuntu-latest
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'
          fetch-depth: 0

      - name: actionlint
        uses: raven-actions/actionlint@e01d1ea33dd6a5ed517d95b4c0c357560ac6f518 # v2.1.1
        with:
            version: ${{ env.ACTIONLINT_VERSION }}

      - name: Ensure SHA pinned actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5.0.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install safe-chain (Aikido malicious-package guard)
        shell: bash
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.8/install-safe-chain.sh | sh -s -- --ci

      - name: Install & run commitlint
        if: ${{ !startsWith(github.head_ref, 'mergify/merge-queue/') }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title  }}
        run: |
          npm ci --ignore-scripts
          echo "$PR_TITLE" | npx commitlint --verbose

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@e673c3917a1aef3c65c972347ed84ccd013ecda4 # v0.2.0
        with:
          persona: pedantic
          version: 1.17.0

      - uses: umbrelladocs/action-linkspector@652f85bc57bb1e7d4327260decc10aa68f7694c3 # v1.4.0
        with:
          filter_mode: nofilter
          config_file: .github/config/.linkspector.yml
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          fail_level: any
