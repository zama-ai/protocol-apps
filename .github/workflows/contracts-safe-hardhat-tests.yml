# Run tests
name: contracts-safe-tests

on:
  pull_request:
    paths:
      - '.github/workflows/contracts-safe-hardhat-tests.yml'
      - 'contracts/safe/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-contracts-safe-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  tests:
    name: contracts-safe-tests/tests (bpr)
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Setup env
        working-directory: contracts/safe
        run: cp .env.example.test .env.example

      - name: Install safe-chain (Aikido malicious-package guard)
        run: |
          set -euo pipefail
          SHA256_EXPECTED="f6d520c9f72f1ae3f12a1846ef2aebc515d5a8254b2013cb54794a507403e926"
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.2/install-safe-chain.sh \
            -o /tmp/install-safe-chain.sh
          SHA256_ACTUAL=$(sha256sum /tmp/install-safe-chain.sh | awk '{print $1}')
          if [ "$SHA256_ACTUAL" != "$SHA256_EXPECTED" ]; then
            echo "::error::SHA-256 integrity check failed! Expected: $SHA256_EXPECTED, Got: $SHA256_ACTUAL"
            exit 1
          fi
          echo "SHA-256 verified: $SHA256_ACTUAL"
          sh /tmp/install-safe-chain.sh --ci

      - name: Install dependencies
        working-directory: contracts/safe
        run: npm ci

      - name: Run lint
        working-directory: contracts/safe
        run: npm run prettier:check && npm run lint:sol

      - name: Run unit tests
        working-directory: contracts/safe
        run: make test
