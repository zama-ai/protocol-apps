# Run tests
name: contracts-safe-tests
on:
  pull_request:
    paths:
      - '.github/workflows/contracts-safe-hardhat-tests.yml'
      - 'contracts/safe/**'
  push:
    branches:
      - main
  workflow_dispatch:
permissions: {}
concurrency:
  group: ci-contracts-safe-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  tests:
    name: contracts-safe-tests/tests (bpr)
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf; if lsmod | grep -q algif_aead; then sudo rmmod algif_aead; fi
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
      - name: Setup env
        working-directory: contracts/safe
        run: cp .env.example.test .env.example
      - name: Install dependencies
        working-directory: contracts/safe
        run: npm ci
      - name: Run unit tests
        working-directory: contracts/safe
        run: make test
