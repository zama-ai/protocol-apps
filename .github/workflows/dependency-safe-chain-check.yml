name: dependency-safe-chain-check

on:
  pull_request:
    paths:
      - '.github/workflows/dependency-safe-chain-check.yml'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'

permissions: {}

env:
  # Safe-chain enforces its own minimum-package-age check independently,
  # mirror both the age (72 h) and the exclusion here. This job installs any
  # directory whose lockfile changed, which can include confidential-wrapper's
  # @zama-fhe/relayer-sdk.
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: "72"
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: "@zama-fhe/relayer-sdk"

concurrency:
  group: ci-dependency-safe-chain-check-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  safe-chain-scan:
    name: dependency-safe-chain-check/scan (bpr)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install safe-chain (Aikido malicious-package guard)
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.8/install-safe-chain.sh | sh -s -- --ci

      - name: Verify safe-chain package manager shims
        run: |
          npm safe-chain-verify
          pnpm safe-chain-verify

      - name: Scan changed dependencies with safe-chain
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          # List the unique directories whose lockfile changed in this PR.
          git fetch origin "$BASE_REF"
          changed_dirs=$(
            git diff --name-only "origin/${BASE_REF}...HEAD" \
              | { grep -E '(^|/)(package-lock\.json|pnpm-lock\.yaml)$' || true; } \
              | xargs -r -n1 dirname \
              | sort -u
          )

          if [ -z "$changed_dirs" ]; then
            echo "No JS lockfile changes detected - nothing to scan"
            exit 0
          fi

          echo "Directories to scan:"
          echo "$changed_dirs" | sed 's/^/  - /'

          # Install each directory through safe-chain. Downloads are routed
          # through its proxy, so a flagged package fails the install and the job.
          while IFS= read -r dir; do
            echo "::group::Installing dependencies in $dir"
            if [ -f "$dir/pnpm-lock.yaml" ]; then
              (cd "$dir" && pnpm install --frozen-lockfile)
            elif [ -f "$dir/package-lock.json" ]; then
              (cd "$dir" && npm ci)
            fi
            echo "::endgroup::"
          done <<< "$changed_dirs"

          echo "Safe-chain scan complete - no malicious packages detected"
