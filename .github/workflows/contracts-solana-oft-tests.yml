# Run tests
name: contracts-solana-oft-tests

on:
  pull_request:

  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-contracts-solana-oft-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-changes:
    name: contracts-solana-oft-tests/check-changes
    permissions:
      actions: 'read' # Required to read workflow run information
      contents: 'read' # Required to checkout repository code
      pull-requests: 'read' # Required to read pull request information
    runs-on: ubuntu-latest
    outputs:
      changes-contracts-solana-oft: ${{ steps.filter.outputs.contracts-solana-oft }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'
          fetch-depth: ${{ github.event_name == 'push' && 0 || 1 }}
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            contracts-solana-oft:
              - .github/workflows/contracts-solana-oft-tests.yml
              - contracts/solanaOFT/**
  tests:
    name: contracts-solana-oft-tests/tests (bpr)
    needs: check-changes
    if: ${{ needs.check-changes.outputs.changes-contracts-solana-oft == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x
          cache: pnpm
          cache-dependency-path: contracts/solanaOFT/pnpm-lock.yaml

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0

      - name: Install dependencies
        working-directory: contracts/solanaOFT
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: contracts/solanaOFT
        run: pnpm run test:forge
