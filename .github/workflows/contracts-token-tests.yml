# Run tests
name: contracts-token-tests

on:
  pull_request:
    paths:
      - '.github/workflows/contracts-token-tests.yml'
      - 'contracts/token/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-contracts-token-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  tests:
    name: contracts-token-tests/tests (bpr)
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: 'false'

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x
          cache: pnpm
          cache-dependency-path: contracts/token/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: contracts/token
        run: pnpm install --frozen-lockfile

      - name: Run compile
        working-directory: contracts/token
        run: pnpm run compile

      - name: Run unit tests
        working-directory: contracts/token
        run: pnpm test
