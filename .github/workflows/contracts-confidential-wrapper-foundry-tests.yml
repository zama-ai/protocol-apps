# Run Foundry fork fixture tests
name: contracts-confidential-wrapper-foundry-tests

on:
  pull_request:
    paths:
      - '.github/workflows/contracts-confidential-wrapper-foundry-tests.yml'
      - 'contracts/confidential-wrapper/**'
      - 'contracts/confidential-token-wrappers-registry/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  # Safe-chain enforces its own minimum-package-age check independently of
  # pnpm-workspace.yaml; mirror both the age (72 h) and the exclusion here.
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: "72"
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: "@zama-fhe/relayer-sdk"

concurrency:
  group: ci-contracts-confidential-wrapper-foundry-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  tests:
    name: contracts-confidential-wrapper-foundry-tests/tests (bpr)
    runs-on: ubuntu-latest
    permissions:
      contents: 'read' # Required to checkout repository code
    steps:
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: v1.3.1

      - name: Install safe-chain (Aikido malicious-package guard)
        shell: bash
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

      - name: Install parent Node dependencies
        working-directory: contracts/confidential-wrapper
        run: npm ci

      - name: Install Foundry dependencies
        working-directory: contracts/confidential-wrapper/test/foundry
        run: npm run setup

      - name: Run build
        working-directory: contracts/confidential-wrapper/test/foundry
        run: npm run build

      - name: Run bake helper tests
        working-directory: contracts/confidential-wrapper/test/foundry
        run: node --test script/bake.test.mjs

      - name: Run Foundry fork fixture tests
        working-directory: contracts/confidential-wrapper/test/foundry
        run: make test
